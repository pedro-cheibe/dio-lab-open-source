<svg xmlns="http://www.w3.org/2000/svg" width="800" height="100">
  <style>
    .rgb {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 45px;
      font-weight: bold;
      text-anchor: middle;
      dominant-baseline: middle;
      animation: cores 4s infinite alternate;
    }
    @keyframes cores {
      0% { fill: #FF0000; }
      20% { fill: #FF7F00; }
      40% { fill: #00FF00; }
      60% { fill: #0000FF; }
      80% { fill: #4B0082; }
      100% { fill: #9400D3; }
    }
  </style>
  <text x="50%" y="50%" class="rgb">Bem vindo ao meu perfil</text>
</svg>